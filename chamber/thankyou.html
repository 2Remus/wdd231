<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Chamber of Commerce</title>
    <link rel="stylesheet" href="styles/join.css">
</head>
<body>
<header>
    <h1>Thank You!</h1>
</header>

<main class="thankyou-container">
    <section class="info-display">
        <h2>Application Received</h2>
        <div id="results">
        </div>
        <a href="join.html" class="back-link">Back to Application</a>
    </section>
</main>

<footer>
    <p>&copy; <span id="current-year"></span> | Chamber of Commerce</p>
</footer>

<script src="scripts/join.js"></script>
<script>
    // Specific logic for thankyou page to display URL params
    const results = document.querySelector('#results');
    const params = new URLSearchParams(window.location.search);

    if (params.has('firstname')) {
        results.innerHTML = `
                <p><strong>Name:</strong> ${params.get('firstname')} ${params.get('lastname')}</p>
                <p><strong>Email:</strong> ${params.get('email')}</p>
                <p><strong>Phone:</strong> ${params.get('phone')}</p>
                <p><strong>Organization:</strong> ${params.get('organization')}</p>
                <p><strong>Level:</strong> ${params.get('level').toUpperCase()}</p>
                <p><strong>Submitted:</strong> ${new Date(params.get('timestamp')).toLocaleString()}</p>
            `;
    } else {
        results.innerHTML = "<p>No application data found.</p>";
    }
</script>
</body>
</html>
